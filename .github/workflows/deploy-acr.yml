name: Build and Push to ACR

# 只在 kiwiagent fork 上运行 —— 上游同名 workflow 无害地失败但不会占我们的时间
on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".github/workflows/deploy-acr.yml"
      - "cli.py"
      - "cli-config.yaml.example"
      - "agent/**"
      - "apps/**"
      - "acp_adapter/**"
      - "acp_registry/**"
      - "hermes/**"
      - "docker/**"
      - "batch_runner.py"
  workflow_dispatch:

env:
  ACR_REGISTRY:  crpi-pee5kv73ffvwtvva.cn-chengdu.personal.cr.aliyuncs.com
  ACR_NAMESPACE: smartbuddy

jobs:
  build:
    # 仅在 kiwiagent 组织下跑, 避免 upstream 同步时误触
    if: github.repository == 'kiwiagent/hermes-agent'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push hermes-agent
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/hermes-agent:latest
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/hermes-agent:${{ github.sha }}
          cache-from: type=gha,scope=hermes-agent
          cache-to: type=gha,mode=max,scope=hermes-agent
